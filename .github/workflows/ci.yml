name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: build
        run: make
      - name: make test model
        run: python3 scripts/make-test-model.py test.gguf
      - name: smoke test (completion)
        run: ./runner -m test.gguf -p "hello" -n 8 --temp 0
      - name: smoke test (suppress tokens)
        # all ids but EOS suppressed: generation must stop before emitting
        # anything, so stdout is exactly the echoed prompt
        run: |
          python3 scripts/make-test-model.py test-sup.gguf --suppress-all-but-eos
          OUT=$(./runner -m test-sup.gguf -p "hello" -n 8 --temp 0 2>/dev/null)
          [ "$OUT" = "hello" ] && echo "suppress ok"
      - name: smoke test (json mode)
        run: ./runner -m test.gguf -p "hi" -n 24 --temp 0 --json 2>/dev/null | python3 -c "import json,sys; json.load(sys.stdin); print('valid json')"
      - name: smoke test (server)
        run: |
          ./runner -m test.gguf --serve --port 8123 --parallel 2 &
          sleep 2
          curl -sf http://127.0.0.1:8123/health
          curl -sf http://127.0.0.1:8123/v1/models
          curl -sf -d '{"messages":[{"role":"user","content":"hi"}],"max_tokens":4,"temperature":0}' \
            http://127.0.0.1:8123/v1/chat/completions | python3 -c "import json,sys; json.load(sys.stdin); print('server valid json')"
          # prefix-cache regression: an identical greedy request must reuse the
          # cached KV and still return the identical completion
          R1=$(curl -sf -d '{"messages":[{"role":"user","content":"again"}],"max_tokens":8,"temperature":0}' http://127.0.0.1:8123/v1/chat/completions)
          R2=$(curl -sf -d '{"messages":[{"role":"user","content":"again"}],"max_tokens":8,"temperature":0}' http://127.0.0.1:8123/v1/chat/completions)
          C1=$(echo "$R1" | python3 -c "import json,sys; print(json.load(sys.stdin)['choices'][0]['message']['content'])")
          C2=$(echo "$R2" | python3 -c "import json,sys; print(json.load(sys.stdin)['choices'][0]['message']['content'])")
          [ "$C1" = "$C2" ] && echo "prefix cache ok"
          kill %1
      - name: smoke test (json schema)
        run: |
          echo '{"type":"object","properties":{"a":{"type":"string","enum":["x","y"]},"b":{"type":"integer"}},"required":["a","b"]}' > ts.json
          ./runner -m test.gguf --json-schema ts.json -p "hi" -n 30 --temp 0 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['a'] in ('x','y') and isinstance(d['b'], int); print('schema ok')"
      - name: smoke test (quantize)
        run: |
          ./runner -m test.gguf --quantize test-q8.gguf --quant q8_0
          ./runner -m test-q8.gguf -p "hi" -n 4 --temp 0
      - name: smoke test (model swap)
        run: |
          ./runner -m "a=test.gguf,b=test-q8.gguf" --serve --port 8124 --ttl 0 &
          sleep 2
          curl -sf -d '{"model":"a","messages":[{"role":"user","content":"x"}],"max_tokens":3}' http://127.0.0.1:8124/v1/chat/completions > /dev/null
          curl -sf -d '{"model":"b","messages":[{"role":"user","content":"x"}],"max_tokens":3}' http://127.0.0.1:8124/v1/chat/completions > /dev/null
          curl -sf http://127.0.0.1:8124/v1/models | python3 -c "import json,sys; assert len(json.load(sys.stdin)['data']) == 2; print('swap ok')"
          kill %1
      - name: sanitizer build + run
        # model weights/vocab live for the whole process and are freed by
        # exit; leak detection would flag them, so keep only error detection
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: |
          make debug
          ./runner-debug -m test.gguf -p "hello" -n 8 --temp 0

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-python
      - name: build
        run: make
      - name: make test model
        run: python3 scripts/make-test-model.py test.gguf
      - name: smoke test (completion)
        run: ./runner.exe -m test.gguf -p "hello" -n 8 --temp 0
      - name: smoke test (suppress tokens)
        run: |
          python3 scripts/make-test-model.py test-sup.gguf --suppress-all-but-eos
          OUT=$(./runner.exe -m test-sup.gguf -p "hello" -n 8 --temp 0 2>/dev/null)
          [ "$OUT" = "hello" ] && echo "suppress ok"
      - name: smoke test (json mode)
        run: ./runner.exe -m test.gguf -p "hi" -n 24 --temp 0 --json 2>/dev/null | python3 -c "import json,sys; json.load(sys.stdin); print('valid json')"
      - name: smoke test (quantize)
        run: |
          ./runner.exe -m test.gguf --quantize test-q8.gguf --quant q8_0
          ./runner.exe -m test-q8.gguf -p "hi" -n 4 --temp 0
      - name: smoke test (server)
        run: |
          ./runner.exe -m test.gguf --serve --port 8123 --parallel 2 &
          sleep 3
          curl -sf http://127.0.0.1:8123/health
          curl -sf -d '{"messages":[{"role":"user","content":"hi"}],"max_tokens":4,"temperature":0}' \
            http://127.0.0.1:8123/v1/chat/completions | python3 -c "import json,sys; json.load(sys.stdin); print('server valid json')"
          kill %1
      - name: smoke test (server, backslash model path)
        # regression: a C:\...\model.gguf -m path used to land unescaped in the
        # response's "model" field, making every completion body invalid JSON
        run: |
          ./runner.exe -m "$(cygpath -w "$PWD")\\test.gguf" --serve --port 8125 &
          sleep 3
          curl -sf -d '{"messages":[{"role":"user","content":"hi"}],"max_tokens":4,"temperature":0}' \
            http://127.0.0.1:8125/v1/chat/completions | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['model'] == 'test.gguf', d['model']; print('windows path model field ok')"
          kill %1
