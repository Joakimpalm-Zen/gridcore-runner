name: release

# Tag a version (git tag v0.1.1-alpha && git push origin v0.1.1-alpha) and
# this builds the three platform binaries and attaches them to a GitHub
# Release draft — publish it after a once-over.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86 builds pin -march=x86-64-v3 (AVX2/FMA/F16C, what the hot
          # kernels use) instead of the Makefile's -march=native, so a binary
          # built on whatever CPU the CI runner has runs on any AVX2 machine.
          - os: ubuntu-latest
            artifact: runner-linux-x86_64
            binary: runner
            march: x86-64-v3
          - os: macos-latest
            artifact: runner-macos-arm64
            binary: runner
            march: native
          - os: windows-latest
            artifact: runner-windows-x86_64.exe
            binary: runner.exe
            march: x86-64-v3
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}
    steps:
      - uses: actions/checkout@v5
      - uses: msys2/setup-msys2@v2
        if: matrix.os == 'windows-latest'
        with:
          msystem: UCRT64
          update: false
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-python
      - name: build
        run: make CFLAGS="-O3 -ffast-math -std=gnu11 -Wall -Wextra -Wno-unused-parameter -march=${{ matrix.march }}"
      - name: version matches the tag
        run: |
          BUILT=$(./${{ matrix.binary }} --version)
          echo "built: $BUILT  tag: $GITHUB_REF_NAME"
          [ "$BUILT" = "runner ${GITHUB_REF_NAME#v}" ]
      - name: smoke test
        run: |
          python3 scripts/make-test-model.py test.gguf
          ./${{ matrix.binary }} -m test.gguf -p "hello" -n 8 --temp 0
      - name: package artifact
        # "copy one binary to a node" stays true: the archive holds the bare
        # binary plus provenance, and the loose binary is still published
        # alongside it. SHA256 lets a node verify what it copied.
        run: |
          cp ${{ matrix.binary }} ${{ matrix.artifact }}
          BUILT=$(./${{ matrix.binary }} --version)
          cat > BUILD-INFO.txt <<EOF
          ${BUILT}
          tag:        ${GITHUB_REF_NAME}
          commit:     ${GITHUB_SHA}
          built:      $(date -u +%Y-%m-%dT%H:%M:%SZ)
          runner-os:  ${{ matrix.os }}
          march:      ${{ matrix.march }}
          EOF
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # zip is the archive Windows users can open without extra tools
            powershell -Command "Compress-Archive -Path '${{ matrix.artifact }}','BUILD-INFO.txt','README.md','LICENSE' -DestinationPath '${{ matrix.artifact }}.zip' -Force"
            ARCHIVE="${{ matrix.artifact }}.zip"
          else
            tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}" BUILD-INFO.txt README.md LICENSE
            ARCHIVE="${{ matrix.artifact }}.tar.gz"
          fi
          # one checksum file per artifact; the release job concatenates them
          if command -v sha256sum > /dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}" "$ARCHIVE" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" "$ARCHIVE" > "${{ matrix.artifact }}.sha256"
          fi
          cat "${{ matrix.artifact }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.sha256
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: collect checksums
        # one SHA256SUMS covering every published file, so a node can verify
        # whichever form it downloaded
        run: |
          cat ./*.sha256 > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            runner-linux-x86_64
            runner-macos-arm64
            runner-windows-x86_64.exe
            runner-linux-x86_64.tar.gz
            runner-macos-arm64.tar.gz
            runner-windows-x86_64.exe.zip
            SHA256SUMS
